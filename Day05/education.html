<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
*{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#00B4DB,#0083B0,#6DD5FA);
            background-size:300% 300%;
            animation:bg 10s ease infinite;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        @keyframes bg{

            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }

        }

        .education-box{

            width:90%;
            max-width:800px;

            background:rgba(255,255,255,.18);

            backdrop-filter:blur(12px);

            border-radius:20px;

            padding:40px;

            box-shadow:0 10px 30px rgba(0,0,0,.25);

            transition:.4s;

        }

        .education-box:hover{

            transform:translateY(-8px);

        }

        h2{

            text-align:center;

            color:#FFD93D;

            font-size:40px;

            margin-bottom:35px;

        }

        ul{

            list-style:none;

        }

        li{

            background:white;

            color:#003049;

            margin:20px 0;

            padding:20px;

            border-left:8px solid #FFD93D;

            border-radius:12px;

            font-size:20px;

            font-weight:500;

            box-shadow:0 5px 15px rgba(0,0,0,.15);

            transition:.3s;

        }

        li:hover{

            transform:translateX(10px);

            background:#FFD93D;

            color:#003049;

        }

        @media(max-width:768px){

            h2{
                font-size:32px;
            }

            li{
                font-size:17px;
                padding:15px;
            }

            .education-box{
                padding:25px;
            }

        }
    </style>
</head>
<body>
   <h2>Education : </h2>

<ul>
<li>B.Com - Maharaja Sayajirao University</li>
<li>PGDCA - Maharaja Sayajirao University</li>

</ul> 
</body>
</html>
