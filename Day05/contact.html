<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
  *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#00B4DB,#0083B0,#6DD5FA);
            background-size:300% 300%;
            animation:bg 10s ease infinite;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        @keyframes bg{

            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }

        }

        .contact-box{

            width:90%;
            max-width:750px;

            background:rgba(255,255,255,.18);

            backdrop-filter:blur(15px);

            border-radius:20px;

            padding:40px;

            box-shadow:0 10px 30px rgba(0,0,0,.25);

            transition:.4s;

        }

        .contact-box:hover{

            transform:translateY(-8px);

        }

        h2{

            text-align:center;

            color:#FFD93D;

            font-size:40px;

            margin-bottom:35px;

        }

        p{

            background:white;

            color:#003049;

            padding:18px 20px;

            margin:20px 0;

            border-left:8px solid #FFD93D;

            border-radius:12px;

            font-size:18px;

            box-shadow:0 5px 15px rgba(0,0,0,.15);

            transition:.3s;

        }

        p:hover{

            transform:translateX(10px);

        }

        a{

            text-decoration:none;

            color:#0083B0;

            font-weight:600;

        }

        a:hover{

            color:#ff6b6b;

            text-decoration:underline;

        }

        @media(max-width:768px){

            h2{
                font-size:32px;
            }

            p{
                font-size:16px;
                padding:15px;
            }

            .contact-box{
                padding:25px;
            }

        }
    </style>
</head>
<body>
    <section id="contact">
    <h2>Contact : </h2>
    <p>Email : yogitachoudhary052@gmail.com</p>
    <p>Phone : +91 7779024533</p>
    <p>GitHub : <a href="https://github.com/yogitachoudhary052-hash">GitHub Profile Link</a></p>
</section>
</body>
</html>
